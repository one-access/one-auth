# Simplified Spring Boot security configuration using built-in features
# This replaces the over-engineered custom implementations

spring:
  # CORS Configuration - replaces custom CorsConfigurationSource
  web:
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
      allowed-methods: GET,POST,PUT,DELETE,OPTIONS
      allowed-headers: Authorization,Content-Type,X-Requested-With,Accept
      exposed-headers: Authorization
      allow-credentials: false
      max-age: 3600

  # Security Headers - replaces manual security header configuration
  security:
    headers:
      frame-options: deny
      content-type-options: nosniff
      referrer-policy: strict-origin-when-cross-origin
      # HSTS will be added automatically in HTTPS environments

  # Session Management
  session:
    store-type: none # Stateless for JWT

# Application-specific configuration
one-auth:
  application:
    app-id: ${APP_ID}
    key-pair:
      current-kid: ${AUTH_IDENTITY_KID}
      private-key-env: "AUTH_IDENTITY_PRIVATE_KEY"
      public-key-env: "AUTH_IDENTITY_PUBLIC_KEY"
    
    app-exclusion-patterns:
      - "/health"
      - "/actuator/health"
      - "/.well-known/jwks.json"
      - "/error"
  
  auth-server:
    base-url: ${AUTH_SERVER_URL}
    jwks-api: "/.well-known/jwks.json"

# Database configuration
spring:
  datasource:
    url: jdbc:mysql://${MYSQL_URL:localhost}:${MYSQL_PORT:3306}/${MYSQL_ONEAUTH_DB_NAME:oneauth-db}
    username: ${MYSQL_ONEAUTH_USERNAME}
    password: ${MYSQL_ONEAUTH_PASSWORD}

# Logging
logging:
  level:
    com.oneaccess.auth: INFO
    org.springframework.security: WARN

# Actuator endpoints
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# Server configuration
server:
  port: ${SERVER_PORT:8080}
  error:
    include-stacktrace: never
    include-message: never

# Required environment variables:
# - CORS_ALLOWED_ORIGINS (optional, has defaults)
# - APP_ID
# - AUTH_IDENTITY_KID
# - AUTH_IDENTITY_PRIVATE_KEY
# - AUTH_IDENTITY_PUBLIC_KEY
# - AUTH_SERVER_URL
# - MYSQL_URL
# - MYSQL_ONEAUTH_USERNAME
# - MYSQL_ONEAUTH_PASSWORD